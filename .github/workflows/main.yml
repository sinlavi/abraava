name: Run YouTube Downloader Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg
        with:
          ffmpeg-version: release
          architecture: ''
          linking-type: static

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install balethon yt-dlp

      - name: Run Bot (with timeout)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
        run: |
          timeout 5.5h python bot.py || true

      - name: Commit and Push Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add archive.db
          git diff-index --quiet HEAD || git commit -m "Auto-update SQLite database"
          git push
