name: Run Bale Music Archive Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bale-music-archive-bot
  cancel-in-progress: true

permissions:
  contents: write
  
jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          cache: 'pip'
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CACHE_CHANNEL_ID: ${{ secrets.CACHE_CHANNEL_ID }}
        run: |
          timeout 5h python bot.py || true

      - name: Commit & Push Updated Database
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cache.db
          git diff-index --quiet HEAD || git commit -m "Auto-update audio database"
          git push
