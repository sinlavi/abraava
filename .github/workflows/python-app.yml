name: Test Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"  # Run every 2 hours

jobs:
  run-bot:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ========== WARP (Cloudflare proxy) ==========
      - name: Get WARP image digest
        id: warp-digest
        run: |
          docker pull --quiet caomingjun/warp
          DIGEST=$(docker inspect caomingjun/warp --format='{{.Id}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: /tmp/warp-image.tar
          key: warp-image-${{ steps.warp-digest.outputs.digest }}

      - name: Load or pull WARP container
        run: |
          if [[ -f /tmp/warp-image.tar ]]; then
            docker load < /tmp/warp-image.tar
          else
            docker pull caomingjun/warp
            docker save caomingjun/warp -o /tmp/warp-image.tar
          fi

      - name: Start Cloudflare WARP proxy
        run: |
          docker network inspect warp-net >/dev/null 2>&1 || docker network create warp-net
          docker rm -f warp 2>/dev/null || true
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 10
          curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 5 || true

      # ========== FFmpeg caching ==========
      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tool_cache/ffmpeg
          key: ffmpeg-release-${{ runner.os }}

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        with:
          ffmpeg-version: release
          architecture: ''
          linking-type: env
          github-token: ${{ github.server_url == 'https://github.com' && github.token || '' }}

      # ========== Python & dependencies ==========
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ========== Run the bot ==========
      - name: Run bot
        id: bot
        continue-on-error: true  # Continue even if bot fails
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
          INFO_CHANNEL_ID: ${{ secrets.INFO_CHANNEL_ID }}
          OFFLINE_MODE: ${{ secrets.OFFLINE_MODE }}
        run: python main.py

      # ========== Database commit & push (always runs) ==========
      - name: Commit and push database changes
        if: always()  # Run even if bot failed or was cancelled
        run: |
          set -e  # Exit on error
          
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Optimize for large files
          git config http.postBuffer 524288000  # 500MB
          git config core.compression 0
          
          # Fetch latest changes to avoid conflicts
          echo "Fetching latest changes..."
          git fetch origin
          git pull --no-rebase origin "${GITHUB_REF_NAME}" || true
          
          # Add all .db files
          echo "Searching for .db files..."
          DB_FILES=$(find . -name "*.db" -type f)
          
          if [[ -z "$DB_FILES" ]]; then
            echo "No .db files found to commit"
            exit 0
          fi
          
          echo "Found database files:"
          echo "$DB_FILES"
          
          # Stage database files
          echo "$DB_FILES" | while read -r file; do
            git add -f "$file"
            echo "Staged: $file"
          done
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit changes
          COMMIT_MSG="Auto-update database $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git commit -m "$COMMIT_MSG"
          echo "Committed with message: $COMMIT_MSG"
          
          # Push with retry logic
          MAX_RETRIES=3
          RETRY_DELAY=5
          
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Push attempt $attempt of $MAX_RETRIES..."
            if git push origin "${GITHUB_REF_NAME}"; then
              echo "Successfully pushed to repository"
              exit 0
            fi
          
            if [[ $attempt -lt $MAX_RETRIES ]]; then
              echo "Push failed, retrying in ${RETRY_DELAY} seconds..."
              sleep $RETRY_DELAY
            fi
          done
          
          echo "Failed to push after $MAX_RETRIES attempts"
          exit 1
        shell: bash

      # ========== Emergency force push (if regular push fails) ==========
      - name: Emergency force push
        if: failure() && steps.commit.outcome == 'failure'
        run: |
          echo "⚠️ Regular push failed, attempting emergency force push..."
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all database files
          find . -name "*.db" -type f -exec git add -f {} \;
          
          # Commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Emergency auto-update $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || true
          fi
          
          # Force push with lease (safer than --force)
          git push --force-with-lease origin "${GITHUB_REF_NAME}" || \
          git push --force origin "${GITHUB_REF_NAME}"
          
          echo "✅ Emergency force push completed"
        shell: bash