name: Test Deploy

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 */3 * * *"
concurrency:
  group: test-deploy
  cancel-in-progress: true

jobs:
  clear-history:
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          
      - name: Delete all workflow runs via API with retry logic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🗑️ Clearing workflow run history via GitHub API..."
          
          REPO="${{ github.repository }}"
          CURRENT_RUN="${{ github.run_id }}"
          echo "Repository: $REPO"
          echo "Current run ID: $CURRENT_RUN (will be preserved)"
          
          DELETED_COUNT=0
          FAILED_COUNT=0
          SKIPPED_COUNT=0
          RATE_LIMITED=0
          
          # GitHub API endpoint for workflow runs
          API_URL="https://api.github.com/repos/$REPO/actions/runs"
          
          # Get total count first
          TOTAL_RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$API_URL?per_page=1" | jq -r '.total_count' 2>/dev/null)
          
          echo "📊 Total workflow runs found: $TOTAL_RUNS"
          echo ""
          
          # Function to delete with retry
          delete_run() {
            local RUN_ID=$1
            local MAX_RETRIES=3
            local RETRY=0
            
            while [ $RETRY -lt $MAX_RETRIES ]; do
              HTTP_STATUS=$(curl -s -X DELETE \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "$API_URL/$RUN_ID" \
                -w "%{http_code}" -o /dev/null)
              
              if [ "$HTTP_STATUS" = "204" ]; then
                return 0
              elif [ "$HTTP_STATUS" = "403" ]; then
                # Check if it's rate limiting
                REMAINING=$(curl -s -H "Authorization: token $GH_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/rate_limit" | jq -r '.resources.actions.remaining')
                
                if [ "$REMAINING" -lt 10 ]; then
                  echo "⚠️ Rate limit almost exhausted ($REMAINING remaining)"
                  echo "⏳ Waiting 60 seconds before retry..."
                  sleep 60
                  RETRY=$((RETRY + 1))
                  continue
                fi
                return 1
              elif [ "$HTTP_STATUS" = "404" ]; then
                return 2
              else
                RETRY=$((RETRY + 1))
                if [ $RETRY -lt $MAX_RETRIES ]; then
                  echo "⏳ Retry $RETRY/$MAX_RETRIES for run $RUN_ID (HTTP $HTTP_STATUS)"
                  sleep 2
                fi
              fi
            done
            return 3
          }
          
          # Process runs in batches
          PAGE=1
          while [ $PAGE -le 10 ]; do  # Limit to 10 pages (1000 runs) to avoid timeout
            echo "📥 Fetching page $PAGE..."
            
            RESPONSE=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "$API_URL?per_page=100&page=$PAGE&status=completed")
            
            # Extract run IDs from response
            RUN_IDS=$(echo "$RESPONSE" | jq -r '.workflow_runs[]?.id' 2>/dev/null)
            
            if [ -z "$RUN_IDS" ] || [ "$RUN_IDS" = "null" ]; then
              echo "✅ No more runs found"
              break
            fi
            
            BATCH_COUNT=0
            for RUN_ID in $RUN_IDS; do
              if [ "$RUN_ID" = "$CURRENT_RUN" ]; then
                echo "⏭️ Skipping current run: $RUN_ID"
                SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                continue
              fi
              
              # Get run status
              RUN_STATUS=$(echo "$RESPONSE" | jq -r --arg id "$RUN_ID" '.workflow_runs[] | select(.id == ($id | tonumber)) | .status' 2>/dev/null)
              
              if [ "$RUN_STATUS" = "in_progress" ] || [ "$RUN_STATUS" = "queued" ]; then
                echo "⏸️ Skipping active run $RUN_ID (status: $RUN_STATUS)"
                SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
                continue
              fi
              
              echo "🗑️ Deleting run ID: $RUN_ID (status: $RUN_STATUS)"
              
              delete_run $RUN_ID
              RESULT=$?
              
              case $RESULT in
                0)
                  echo "✅ Successfully deleted run $RUN_ID"
                  DELETED_COUNT=$((DELETED_COUNT + 1))
                  BATCH_COUNT=$((BATCH_COUNT + 1))
                  ;;
                1)
                  echo "⚠️ Permission denied for run $RUN_ID"
                  FAILED_COUNT=$((FAILED_COUNT + 1))
                  ;;
                2)
                  echo "⚠️ Run $RUN_ID not found (already deleted)"
                  FAILED_COUNT=$((FAILED_COUNT + 1))
                  ;;
                3)
                  echo "❌ Failed to delete run $RUN_ID after retries"
                  FAILED_COUNT=$((FAILED_COUNT + 1))
                  ;;
              esac
              
              # Small delay to avoid rate limiting
              sleep 0.3
            done
            
            echo "📊 Page $PAGE completed: Deleted $BATCH_COUNT runs in this batch"
            echo ""
            
            # Check rate limit status
            REMAINING=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/rate_limit" | jq -r '.resources.actions.remaining')
            
            echo "💳 Rate limit remaining: $REMAINING"
            
            if [ "$REMAINING" -lt 50 ]; then
              echo "⚠️ Rate limit getting low, waiting 30 seconds..."
              sleep 30
            fi
            
            # Check if there's a next page
            NEXT_PAGE=$(echo "$RESPONSE" | jq -r '.links.next' 2>/dev/null)
            if [ "$NEXT_PAGE" = "null" ] || [ -z "$NEXT_PAGE" ]; then
              break
            fi
            
            PAGE=$((PAGE + 1))
          done
          
          echo ""
          echo "════════════════════════════════════════"
          echo "📊 FINAL SUMMARY:"
          echo "════════════════════════════════════════"
          echo "✅ Successfully deleted: $DELETED_COUNT runs"
          echo "⚠️ Failed to delete: $FAILED_COUNT runs"
          echo "⏭️ Skipped: $SKIPPED_COUNT runs"
          echo "────────────────────────────────────────"
          echo "💡 Note:"
          echo "   - Failed runs may be protected or require admin permissions"
          echo "   - Some runs might have been deleted by GitHub automatically"
          echo "   - In-progress runs cannot be deleted"
          echo "════════════════════════════════════════"
          
          # Try one more time with different approach for failed runs if any
          if [ $FAILED_COUNT -gt 0 ]; then
            echo ""
            echo "🔄 Attempting to delete failed runs with personal access token method..."
            echo "⚠️ This step requires a personal access token with workflow scope"
            echo "⚠️ Skipping due to token limitations..."
          fi

  run-bot:
    needs: clear-history
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ========== FFmpeg setup with caching ==========
      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            ~/ffmpeg-bin
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-linux64-${{ runner.os }}-v1
          restore-keys: |
            ffmpeg-static-linux64-${{ runner.os }}-

      - name: Download and install FFmpeg static build (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ffmpeg-bin
          cd ~/ffmpeg-bin
          
          echo "📥 Downloading FFmpeg from GitHub releases..."
          wget --timeout=60 --tries=3 --retry-connrefused --progress=dot:giga \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          
          if [ ! -f "ffmpeg-master-latest-linux64-gpl.tar.xz" ]; then
            echo "❌ Download failed, trying fallback..."
            wget --timeout=60 --tries=3 \
              https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2025-01-01-12-54/ffmpeg-master-latest-linux64-gpl.tar.xz
          fi
          
          echo "📦 Extracting FFmpeg..."
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          
          echo "🔧 Installing FFmpeg..."
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          sudo chmod +x /usr/local/bin/ffmpeg /usr/local/bin/ffprobe
          
          rm -rf ffmpeg-master-latest-linux64-gpl*
          echo "✅ FFmpeg installed to /usr/local/bin"

      - name: Verify FFmpeg installation
        id: verify-ffmpeg
        run: |
          if command -v ffmpeg &> /dev/null; then
            echo "✅ FFmpeg version: $(ffmpeg -version | head -n1)"
            echo "📍 FFmpeg path: $(which ffmpeg)"
            echo "✅ FFprobe version: $(ffprobe -version | head -n1)"
            echo "📍 FFprobe path: $(which ffprobe)"
            
            ffmpeg -f lavfi -i nullsrc=s=100x100:d=1 -f null - 2>&1 | grep -q "filter" && echo "✅ FFmpeg working correctly"
          else
            echo "❌ FFmpeg installation failed"
            exit 1
          fi

      # ========== WARP (Cloudflare proxy) with caching ==========
      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: /tmp/warp-image.tar
          key: warp-image-caomingjun-warp-${{ runner.os }}-v1
          restore-keys: |
            warp-image-caomingjun-warp-${{ runner.os }}-

      - name: Load cached WARP image if exists
        if: steps.cache-warp.outputs.cache-hit == 'true'
        run: |
          echo "📦 Loading WARP from cache..."
          docker load < /tmp/warp-image.tar
          echo "✅ WARP loaded from cache"

      - name: Pull fresh WARP image if not cached
        if: steps.cache-warp.outputs.cache-hit != 'true'
        run: |
          echo "🌐 Pulling fresh WARP image..."
          docker pull caomingjun/warp
          docker save caomingjun/warp -o /tmp/warp-image.tar
          echo "✅ WARP pulled and saved to cache"

      - name: Remove old WARP data volume for fresh IP
        continue-on-error: true
        run: |
          docker rm -f warp 2>/dev/null || true
          docker volume rm warp-data 2>/dev/null || true
          echo "🧹 Removed old WARP data"

      - name: Start Cloudflare WARP proxy
        id: warp-start
        run: |
          docker network inspect warp-net >/dev/null 2>&1 || docker network create warp-net
          
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          
          echo "⏳ Waiting for WARP to initialize..."
          for i in {1..30}; do
            if curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 5 --silent | grep -q "warp=on"; then
              echo "✅ WARP proxy is working!"
              break
            fi
            echo "⏳ Attempt $i/30: WARP not ready yet..."
            sleep 5
          done
          
          echo "🌐 External IP:"
          curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 10 | grep "ip=" || echo "⚠️ Could not get IP, but continuing..."

      # ========== Python environment ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            echo "✅ Dependencies installed from requirements.txt"
          else
            echo "⚠️ requirements.txt not found"
          fi

      # ========== Run bot ==========
      - name: Run bot
        id: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OFFLINE_MODE: ${{ secrets.OFFLINE_MODE }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
          INFO_CHANNEL_ID: ${{ secrets.INFO_CHANNEL_ID }}
        run: |
          echo "🚀 Starting bot..."
          python main.py

      # ========== Restart on failure (for all event types, including schedule) ==========
      - name: Restart workflow on failure
        if: failure()   # بدون شرط && github.event_name != 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⚠️ Workflow failed! Triggering restart..."
          echo "📝 Failed job: ${{ github.job }}"
          echo "🔄 Branch: ${{ github.ref_name }}"
          echo "🔗 Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          sleep 10
          
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}" --repo "${{ github.repository }}"
          
          echo "✅ Restart triggered successfully"
          exit 1
