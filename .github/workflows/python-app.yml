name: Test Deploy

on:
  workflow_dispatch:
  push:  # Auto-start on push
  schedule:
    - cron: "0 */3 * * *"  # Run every 3 hours

concurrency:
  group: test-deploy
  cancel-in-progress: true

jobs:
  run-bot:
    permissions:
      contents: write
      actions: write  # Required to trigger a workflow restart via GH CLI
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ========== WARP (Cloudflare proxy) - Fresh IP each time ==========
      - name: Get WARP image digest
        id: warp-digest
        run: |
          docker pull --quiet caomingjun/warp
          DIGEST=$(docker inspect caomingjun/warp --format='{{.Id}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: /tmp/warp-image.tar
          key: warp-image-${{ steps.warp-digest.outputs.digest }}

      - name: Load or pull WARP container
        id: warp-pull
        run: |
          if [[ -f /tmp/warp-image.tar ]]; then
            docker load < /tmp/warp-image.tar
          else
            docker pull caomingjun/warp
            docker save caomingjun/warp -o /tmp/warp-image.tar
          fi

      - name: Remove old WARP data volume for fresh IP
        id: cleanup-warp-data
        continue-on-error: true
        run: |
          docker rm -f warp 2>/dev/null || true
          docker volume rm warp-data 2>/dev/null || true
          echo "Removed old WARP data to get a fresh IP"

      - name: Start Cloudflare WARP proxy (new IP)
        id: warp-start
        run: |
          docker network inspect warp-net >/dev/null 2>&1 || docker network create warp-net
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 15
          
          # Test proxy connection
          echo "Testing WARP proxy connection..."
          if curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 10 | grep -q "warp=on"; then
            echo "WARP proxy is working!"
            curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 10 | grep "ip="
          else
            echo "WARP proxy failed to connect"
            exit 1
          fi

      # ========== FFmpeg caching ==========
      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tool_cache/ffmpeg
          key: ffmpeg-release-${{ runner.os }}

      - name: Set up FFmpeg
        id: ffmpeg-setup
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release
          architecture: ''
          linking-type: env
          github-token: ${{ github.server_url == 'https://github.com && github.token' || '' }}

      - name: Verify FFmpeg installation
        id: verify-ffmpeg
        run: |
          if command -v ffmpeg &> /dev/null; then
            echo "FFmpeg installed: $(ffmpeg -version | head -n1)"
          else
            echo "FFmpeg not found in PATH"
            exit 1
          fi

      # ========== Python & dependencies ==========
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ========== Run bot ==========
      - name: Run bot
        id: bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OFFLINE_MODE: ${{ secrets.OFFLINE_MODE }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
          INFO_CHANNEL_ID: ${{ secrets.INFO_CHANNEL_ID }}
        run: python main.py

      # ========== Restart on Failure ==========
      - name: Restart workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Workflow failed! Triggering a restart..."
          echo "Failed step: ${{ github.job }}"
          
          # Wait a moment before restarting
          sleep 10
          
          # Trigger new workflow run
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}"
          
          # Exit with error to mark this run as failed
          exit 1
