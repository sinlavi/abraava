name: Test Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"  # Every 2 hours

concurrency:
  group: test-deploy
  cancel-in-progress: true
  
jobs:
  run-bot:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ========== WARP (Cloudflare proxy) ==========
      - name: Get WARP image digest
        id: warp-digest
        run: |
          docker pull --quiet caomingjun/warp
          DIGEST=$(docker inspect caomingjun/warp --format='{{.Id}}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: /tmp/warp-image.tar
          key: warp-image-${{ steps.warp-digest.outputs.digest }}

      - name: Load or pull WARP container
        run: |
          if [[ -f /tmp/warp-image.tar ]]; then
            docker load < /tmp/warp-image.tar
          else
            docker pull caomingjun/warp
            docker save caomingjun/warp -o /tmp/warp-image.tar
          fi

      - name: Start Cloudflare WARP proxy
        run: |
          docker network inspect warp-net >/dev/null 2>&1 || docker network create warp-net
          docker rm -f warp 2>/dev/null || true
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 10
          curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 5 || true

      # ========== FFmpeg caching ==========
      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/tool_cache/ffmpeg
          key: ffmpeg-release-${{ runner.os }}

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        with:
          ffmpeg-version: release
          architecture: ''
          linking-type: env
          github-token: ${{ github.server_url == 'https://github.com' && github.token || '' }}

      # ========== Python & dependencies ==========
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ========== اجرای بات با commit خودکار در هر حالت خروج ==========
      - name: Run bot with auto commit/push on exit
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OFFLINE_MODE: ${{ secrets.OFFLINE_MODE }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
          INFO_CHANNEL_ID: ${{ secrets.INFO_CHANNEL_ID }}
        shell: bash
        run: |
          # تابع commit و push با قابلیت retry و force push در صورت لزوم
          commit_and_push() {
            echo "🔄 Committing and pushing database changes (triggered by exit/signal)..."
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config http.postBuffer 524288000
            git config core.compression 0
            
            # دریافت آخرین تغییرات برای کاهش conflict
            git fetch origin
            git pull --no-rebase origin "${GITHUB_REF_NAME}" || true
            
            # یافتن تمام فایل‌های دیتابیس
            DB_FILES=$(find . -name "*.db" -type f)
            if [[ -z "$DB_FILES" ]]; then
              echo "📭 No .db files found to commit"
              return 0
            fi
            
            echo "📁 Found database files:"
            echo "$DB_FILES"
            
            # stage کردن فایل‌ها
            echo "$DB_FILES" | while read -r file; do
              git add -f "$file"
              echo "Staged: $file"
            done
            
            # بررسی وجود تغییر
            if git diff --cached --quiet; then
              echo "✅ No changes to commit"
              return 0
            fi
            
            COMMIT_MSG="Auto-update database $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git commit -m "$COMMIT_MSG"
            echo "Committed: $COMMIT_MSG"
            
            # تلاش push با retry
            MAX_RETRIES=3
            for attempt in $(seq 1 $MAX_RETRIES); do
              echo "Push attempt $attempt of $MAX_RETRIES..."
              if git push origin "${GITHUB_REF_NAME}"; then
                echo "✅ Successfully pushed to repository"
                return 0
              fi
              if [[ $attempt -lt $MAX_RETRIES ]]; then
                echo "Retrying in 5 seconds..."
                sleep 5
              fi
            done
            
            # اگر همه تلاش‌ها failed، force push با احتیاط
            echo "⚠️ Regular push failed, attempting force-with-lease..."
            git push --force-with-lease origin "${GITHUB_REF_NAME}" || \
            git push --force origin "${GITHUB_REF_NAME}"
            echo "✅ Emergency force push completed"
          }
          
          # اطمینان از اجرای تابع در هر نوع خروج (normal, error, SIGTERM, SIGINT)
          trap commit_and_push EXIT SIGTERM SIGINT
          
          # اجرای بات اصلی
          python main.py
          
          # توجه: تابع commit_and_push به‌خودی خود به دلیل trap EXIT دوباره اجرا می‌شود.
          # نیازی به فراخوانی اضافه نیست.

      # ========== عقب‌نشینی نهایی (اختیاری) ==========
      # اگر مرحله بالا به هر دلیلی کاملاً از بین رفت (SIGKILL یا crash شدید)،
      # این مرحله به‌عنوان یک لایه امنیتی اضافه تلاش می‌کند.
      - name: Emergency fallback commit
        if: always() && failure()
        run: |
          echo "⚠️ Main step failed or was killed. Attempting emergency fallback..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          find . -name "*.db" -type f -exec git add -f {} \;
          if ! git diff --cached --quiet; then
            git commit -m "Emergency fallback $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || true
            git push --force-with-lease origin "${GITHUB_REF_NAME}" || git push --force origin "${GITHUB_REF_NAME}"
          fi
        shell: bash
