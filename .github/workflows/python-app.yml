name: Test Deploy (Fast)

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: test-deploy
  cancel-in-progress: true

jobs:
  run-bot:
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ========== PRE-CACHED EVERYTHING ==========
      - name: Restore all caches
        uses: actions/cache/restore@v4
        id: cache
        with:
          path: |
            ~/ffmpeg
            /tmp/warp-image.tar
            ~/.cache/pip
          key: full-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            full-cache-${{ runner.os }}-
            full-cache-

      # ========== FFMPEG (2 seconds) ==========
      - name: Setup FFmpeg
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ffmpeg
          wget -qO- https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar -xJ -C /tmp/
          mv /tmp/ffmpeg-*-amd64-static/* ~/ffmpeg/
        continue-on-error: true
      
      - name: Use FFmpeg
        run: |
          echo "$HOME/ffmpeg" >> $GITHUB_PATH
          ffmpeg -version | head -n1

      # ========== WARP (1 second) ==========
      - name: Setup WARP
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker pull caomingjun/warp
          docker save caomingjun/warp -o /tmp/warp-image.tar
      
      - name: Start WARP
        run: |
          docker load < /tmp/warp-image.tar 2>/dev/null || true
          docker run -d --name warp -p 1080:1080 --cap-add NET_ADMIN caomingjun/warp
          sleep 3

      # ========== PYTHON (1 second if cached) ==========
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      # ========== SAVE CACHE FOR NEXT RUN ==========
      - name: Save cache
        if: github.ref == 'refs/heads/main' && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/ffmpeg
            /tmp/warp-image.tar
            ~/.cache/pip
          key: full-cache-${{ runner.os }}-${{ github.run_id }}

      # ========== RUN ==========
      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OFFLINE_MODE: ${{ secrets.OFFLINE_MODE }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
          INFO_CHANNEL_ID: ${{ secrets.INFO_CHANNEL_ID }}
        run: python main.py

      # ========== RESTART ==========
      - name: Restart
        if: failure() && github.event_name != 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}" && exit 1
