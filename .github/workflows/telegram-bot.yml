name: Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  clear-history:
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Keep only 6 latest runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW_ID="telegram-bot.yml"

          echo "📊 Fetching runs for $WORKFLOW_ID..."
          RUNS=$(gh api repos/$REPO/actions/workflows/$WORKFLOW_ID/runs --paginate -q '.workflow_runs[] | select(.status == "completed" or .status == "success" or .status == "failure") | .id')

          COUNT=0
          for RUN_ID in $RUNS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 6 ]; then
              echo "🗑️ Deleting old run $RUN_ID"
              gh api -X DELETE repos/$REPO/actions/runs/$RUN_ID
            else
              echo "✅ Keeping run $RUN_ID"
            fi
          done

  run-bot:
    needs: clear-history
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ========== FFmpeg setup with caching ==========
      - name: Cache FFmpeg binaries
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            ~/ffmpeg-bin
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-static-linux64-${{ runner.os }}-v1
          restore-keys: |
            ffmpeg-static-linux64-${{ runner.os }}-

      - name: Download and install FFmpeg static build (if not cached)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ffmpeg-bin
          cd ~/ffmpeg-bin

          echo "📥 Downloading FFmpeg from GitHub releases..."
          wget --timeout=60 --tries=3 --retry-connrefused --progress=dot:giga \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

          if [ ! -f "ffmpeg-master-latest-linux64-gpl.tar.xz" ]; then
            echo "❌ Download failed, trying fallback..."
            wget --timeout=60 --tries=3 \
              https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2025-01-01-12-54/ffmpeg-master-latest-linux64-gpl.tar.xz
          fi

          echo "📦 Extracting FFmpeg..."
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

          echo "🔧 Installing FFmpeg..."
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo cp ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          sudo chmod +x /usr/local/bin/ffmpeg /usr/local/bin/ffprobe

          rm -rf ffmpeg-master-latest-linux64-gpl*
          echo "✅ FFmpeg installed to /usr/local/bin"

      - name: Verify FFmpeg installation
        id: verify-ffmpeg
        run: |
          if command -v ffmpeg &> /dev/null; then
            echo "✅ FFmpeg version: $(ffmpeg -version | head -n1)"
            echo "📍 FFmpeg path: $(which ffmpeg)"
            echo "✅ FFprobe version: $(ffprobe -version | head -n1)"
            echo "📍 FFprobe path: $(which ffprobe)"

            ffmpeg -f lavfi -i nullsrc=s=100x100:d=1 -f null - 2>&1 | grep -q "filter" && echo "✅ FFmpeg working correctly"
          else
            echo "❌ FFmpeg installation failed"
            exit 1
          fi

      # ========== WARP (Cloudflare proxy) with caching ==========
      - name: Cache WARP Docker image
        id: cache-warp
        uses: actions/cache@v4
        with:
          path: /tmp/warp-image.tar
          key: warp-image-caomingjun-warp-${{ runner.os }}-v1
          restore-keys: |
            warp-image-caomingjun-warp-${{ runner.os }}-

      - name: Load cached WARP image if exists
        if: steps.cache-warp.outputs.cache-hit == 'true'
        run: |
          echo "📦 Loading WARP from cache..."
          docker load < /tmp/warp-image.tar
          echo "✅ WARP loaded from cache"

      - name: Pull fresh WARP image if not cached
        if: steps.cache-warp.outputs.cache-hit != 'true'
        run: |
          echo "🌐 Pulling fresh WARP image..."
          docker pull caomingjun/warp
          docker save caomingjun/warp -o /tmp/warp-image.tar
          echo "✅ WARP pulled and saved to cache"

      - name: Remove old WARP data volume for fresh IP
        continue-on-error: true
        run: |
          docker rm -f warp 2>/dev/null || true
          docker volume rm warp-data 2>/dev/null || true
          echo "🧹 Removed old WARP data"

      - name: Start Cloudflare WARP proxy
        id: warp-start
        run: |
          docker network inspect warp-net >/dev/null 2>&1 || docker network create warp-net

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "⏳ Waiting for WARP to initialize..."
          for i in {1..30}; do
            if curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 5 --silent | grep -q "warp=on"; then
              echo "✅ WARP proxy is working!"
              break
            fi
            echo "⏳ Attempt $i/30: WARP not ready yet..."
            sleep 5
          done

          echo "🌐 External IP:"
          curl -x socks5h://127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace --max-time 10 | grep "ip=" || echo "⚠️ Could not get IP, but continuing..."

      # ========== Python environment ==========
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            echo "✅ Dependencies installed from requirements.txt"
          else
            echo "⚠️ requirements.txt not found"
          fi

      # ========== Run bot ==========
      - name: Run bot
        id: bot
        env:
          PLATFORM: telegram
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          OFFLINE_MODE: ${{ secrets.OFFLINE_MODE }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
          INFO_CHANNEL_ID: ${{ secrets.TELEGRAM_INFO_CHANNEL_ID }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          echo "🚀 Starting bot..."
          python main.py

      # ========== Restart on failure ==========
      - name: Restart workflow on failure
        if: failure() && github.event_name != 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⚠️ Workflow failed! Triggering restart..."
          echo "📝 Failed job: ${{ github.job }}"
          echo "🔄 Branch: ${{ github.ref_name }}"
          echo "🔗 Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          sleep 10

          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}" --repo "${{ github.repository }}"

          echo "✅ Restart triggered successfully"
          exit 1
