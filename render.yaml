services:
  - type: web
    name: abraava-bot
    env: docker
    plan: free
    region: ohio
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DB_CHANNEL_ID
        sync: false
      - key: INFO_CHANNEL_ID
        sync: false
      - key: API_BASE_URL
        value: https://3rah.ir/users/index.php
      - key: API_TOKEN
        sync: false
      - key: PORT
        value: 8080
      - key: PLATFORM
        value: bale
